<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minha Loja</title>
<style>
  body { font-family: Arial; margin: 0; background: #f7f7f7; }
  header { background: #111; color: #fff; padding: 20px; text-align: center; }
  .produtos { display: grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap: 20px; padding: 20px; }
  .card { background: #fff; border-radius: 10px; padding: 10px; box-shadow: 0 0 10px #0001; }
  .card img { width: 100%; border-radius: 10px; }
  .card h3 { margin: 10px 0; }
  .btn { display: block; background: #111; color: #fff; padding: 10px; text-align: center; border-radius: 5px; text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>Minha Loja Virtual</h1>
</header>

<div class="produtos">

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="">
    <h3>Produto 1</h3>
    <p>R$ 25,00</p>
    <a class="btn" href="produto1.html">Ver Produto</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="">
    <h3>Produto 2</h3>
    <p>R$ 40,00</p>
    <a class="btn" href="produto2.html">Ver Produto</a>
  </div>

</div>

</body>
</html>
